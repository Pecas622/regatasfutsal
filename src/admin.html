<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏃 SISTEMA ADMIN CLUB PRO</title>

  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  
  <!-- CHART.JS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- SHEETJS -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/xlsx.mjs"></script>
  
  <!-- SWEETALERT -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Barlow, sans-serif;
      background: #0a0f1f;
      color: #ecf0f1;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    header {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 24px;
      font-weight: 700;
    }

    header button {
      padding: 10px 20px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
    }

    header button:hover {
      background: #c0392b;
    }

    #user-info {
      font-size: 14px;
      opacity: 0.8;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 12px 20px;
      background: #1f2a44;
      color: white;
      border: 2px solid #2d3e5f;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .tab-btn.active {
      background: #27ae60;
      border-color: #229954;
    }

    .tab-btn:hover {
      background: #27ae60;
    }

    .tab-content {
      display: none;
      background: #0f1423;
      padding: 25px;
      border-radius: 8px;
      border: 1px solid #1f2a44;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 15px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      background: #1f2a44;
      color: #ecf0f1;
      border: 1px solid #2d3e5f;
      border-radius: 5px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #27ae60;
      box-shadow: 0 0 5px rgba(39, 174, 96, 0.3);
    }

    button {
      padding: 12px 20px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    button:hover {
      background: #229954;
    }

    .btn-danger {
      background: #e74c3c;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #1f2a44;
      padding: 20px;
      border-radius: 8px;
      border-left: 4px solid #27ae60;
    }

    .stat-card h4 {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table th {
      background: #1f2a44;
      padding: 12px;
      text-align: left;
      border: 1px solid #2d3e5f;
      font-weight: 600;
    }

    table td {
      padding: 12px;
      border: 1px solid #2d3e5f;
    }

    table tr:hover {
      background: #1a2437;
    }

    #chart-mes {
      margin: 20px 0;
      max-width: 600px;
    }

    .login-box {
      max-width: 400px;
      margin: 100px auto;
      background: #1f2a44;
      padding: 40px;
      border-radius: 8px;
      border: 1px solid #2d3e5f;
    }

    .login-box h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .login-box input {
      margin-bottom: 15px;
    }

    .login-box button {
      width: 100%;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .checkbox-wrapper input {
      width: auto;
      margin: 0;
    }

    .checkbox-wrapper label {
      margin: 0;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 10px;
      }

      .tabs {
        justify-content: flex-start;
        overflow-x: auto;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- LOGIN -->
    <div id="login-box" class="login-box" style="display: none;">
      <h2>🔐 LOGIN ADMIN</h2>
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="pass" placeholder="Contraseña" />
      <button onclick="login()">ENTRAR</button>
    </div>

    <!-- PANEL ADMIN -->
    <div id="admin-panel" style="display: none;">
      <header>
        <h1>🏃 SISTEMA ADMIN CLUB PRO</h1>
        <div style="text-align: right;">
          <div id="user-info"></div>
          <button onclick="logout()">🚪 SALIR</button>
        </div>
      </header>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('dashboard')">📊 DASHBOARD</button>
        <button class="tab-btn" onclick="showTab('pagos')">💰 CUOTAS</button>
        <button class="tab-btn" onclick="showTab('deudores')">❌ DEUDORES</button>
        <button class="tab-btn" onclick="showTab('asistencia')">⚽ ASISTENCIA</button>
        <button class="tab-btn" onclick="showTab('historial')">📜 HISTORIAL</button>
      </div>

      <!-- 📊 DASHBOARD -->
      <div id="dashboard" class="tab-content active">
        <h2>📊 DASHBOARD</h2>
        
        <div class="stats">
          <div class="stat-card">
            <h4>💵 Total Ingresos</h4>
            <div class="value" id="total-ingresos">$0</div>
          </div>
          <div class="stat-card">
            <h4>✅ Total Pagos</h4>
            <div class="value" id="total-pagos">0</div>
          </div>
          <div class="stat-card">
            <h4>❌ Deudores</h4>
            <div class="value" id="total-deudores">0</div>
          </div>
        </div>

        <h3>Ingresos por Mes</h3>
        <canvas id="chart-mes"></canvas>

        <button onclick="exportarExcel()" style="margin-top: 20px;">📤 EXPORTAR A EXCEL</button>
      </div>

      <!-- 💰 CUOTAS -->
      <div id="pagos" class="tab-content">
        <h2>💰 REGISTRAR CUOTA</h2>
        
        <div class="grid-2">
          <div>
            <h3>Nuevo Pago</h3>
            <div class="form-group">
              <input type="text" id="p-nombre" placeholder="Nombre jugador" />
            </div>
            <div class="form-group">
              <input type="number" id="p-dni" placeholder="DNI" />
            </div>
            <div class="form-group">
              <input type="text" id="p-mes" placeholder="Mes (ej: Abril)" />
            </div>
            <div class="form-group">
              <input type="number" id="p-monto" placeholder="Monto ($)" />
            </div>
            <button onclick="registrarPago()" style="width: 100%;">✅ REGISTRAR PAGO</button>
          </div>
        </div>

        <h3 style="margin-top: 30px;">📋 Lista de Pagos</h3>
        <div id="lista-pagos"></div>
      </div>

      <!-- ❌ DEUDORES -->
      <div id="deudores" class="tab-content">
        <h2>❌ DEUDORES DEL MES</h2>
        <div id="lista-deudores"></div>
      </div>

      <!-- ⚽ ASISTENCIA -->
      <div id="asistencia" class="tab-content">
        <h2>⚽ CONTROL DE ASISTENCIA</h2>
        
        <div class="grid-2">
          <div>
            <h3>Registrar Asistencia</h3>
            <div class="form-group">
              <input type="number" id="a-dni" placeholder="DNI del jugador" />
            </div>
            <div class="checkbox-wrapper">
              <input type="checkbox" id="a-presente" />
              <label for="a-presente">✅ Presente</label>
            </div>
            <button onclick="registrarAsistencia()" style="width: 100%;">GUARDAR</button>
          </div>
        </div>

        <h3 style="margin-top: 30px;">📋 Asistencia de Hoy</h3>
        <div id="lista-asistencia"></div>
      </div>

      <!-- 📜 HISTORIAL -->
      <div id="historial" class="tab-content">
        <h2>📜 HISTORIAL POR JUGADOR</h2>
        
        <div class="form-group">
          <input type="number" id="search-dni" placeholder="Buscar por DNI" />
        </div>
        <button onclick="buscarHistorial()" style="width: 100%;">🔍 BUSCAR</button>

        <div id="historial-result" style="margin-top: 20px;"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initAuth } from "./js/admin-system.js";

    window.showTab = (tab) => {
      // Ocultar todos
      document.querySelectorAll(".tab-content").forEach((t) => {
        t.classList.remove("active");
      });
      document.querySelectorAll(".tab-btn").forEach((b) => {
        b.classList.remove("active");
      });

      // Mostrar seleccionado
      document.getElementById(tab).classList.add("active");
      event.target.classList.add("active");
    };

    // INICIAR
    initAuth();
  </script>
</body>

</html>
